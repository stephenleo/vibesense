name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build-and-package:
    needs: lint-and-typecheck
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
          - target: darwin-x64
            os: macos-13
          - target: linux-x64
            os: ubuntu-latest
          - target: win32-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npx electron-rebuild -f -w node-hid
        continue-on-error: true   # TODO: remove continue-on-error after Story 1.2 (node-hid) merges
      - run: npx @vscode/vsce package --target ${{ matrix.target }} --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vibesense-${{ matrix.target }}
          path: "*.vsix"
