name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # npm trusted publishing (OIDC) — no stored token to rotate

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; Node 22 bundles 10.x. Pinned to
      # 11.x: npm 12 blocks dependency install scripts unless allowlisted, which
      # breaks node-pty/node-hid native builds — revisit via allowScripts when
      # upgrading deliberately.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run verify
      - run: npm publish --access public
      # Tags alone don't show under "Releases" — create the Release object too.
      - run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
